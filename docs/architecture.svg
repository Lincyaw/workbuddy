<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#64748b"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#10b981"/>
    </marker>
    <marker id="arrow-amber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#f59e0b"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="580" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Workbuddy Architecture</text>

  <!-- ==================== GitHub ==================== -->
  <rect x="320" y="56" width="260" height="88" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="320" y="56" width="260" height="28" rx="12" fill="#0d1117"/>
  <rect x="320" y="72" width="260" height="12" fill="#0d1117"/>
  <text x="450" y="75" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">GitHub</text>
  <text x="370" y="108" font-size="11" fill="#475569">Issues</text>
  <text x="370" y="124" font-size="11" fill="#475569">Labels</text>
  <text x="490" y="108" font-size="11" fill="#475569">Pull Requests</text>
  <text x="490" y="124" font-size="11" fill="#475569">Comments</text>

  <!-- ==================== Coordinator ==================== -->
  <g transform="translate(270, 196)">
    <rect width="360" height="156" rx="12" fill="#fff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
    <rect width="360" height="28" rx="12" fill="#3b82f6"/>
    <rect y="16" width="360" height="12" fill="#3b82f6"/>
    <text x="180" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Coordinator</text>

    <!-- Inner modules -->
    <rect x="16" y="42" width="100" height="36" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
    <text x="66" y="64" text-anchor="middle" font-size="10" fill="#1e40af">Poller</text>

    <rect x="130" y="42" width="100" height="36" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
    <text x="180" y="58" text-anchor="middle" font-size="10" fill="#1e40af">State</text>
    <text x="180" y="70" text-anchor="middle" font-size="10" fill="#1e40af">Machine</text>

    <rect x="244" y="42" width="100" height="36" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
    <text x="294" y="64" text-anchor="middle" font-size="10" fill="#1e40af">Router</text>

    <rect x="16" y="92" width="100" height="36" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
    <text x="66" y="114" text-anchor="middle" font-size="10" fill="#1e40af">Reporter</text>

    <rect x="130" y="92" width="100" height="36" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
    <text x="180" y="114" text-anchor="middle" font-size="10" fill="#1e40af">SQLite</text>

    <rect x="244" y="92" width="100" height="36" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
    <text x="294" y="108" text-anchor="middle" font-size="10" fill="#1e40af">Worker</text>
    <text x="294" y="120" text-anchor="middle" font-size="10" fill="#1e40af">Registry</text>
  </g>

  <!-- ==================== Workers ==================== -->
  <!-- Worker A -->
  <g transform="translate(60, 420)">
    <rect width="230" height="120" rx="12" fill="#fff" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
    <rect width="230" height="28" rx="12" fill="#10b981"/>
    <rect y="16" width="230" height="12" fill="#10b981"/>
    <text x="115" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Worker A</text>

    <rect x="14" y="42" width="96" height="32" rx="6" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
    <text x="62" y="62" text-anchor="middle" font-size="10" fill="#065f46">Launcher</text>

    <rect x="120" y="42" width="96" height="32" rx="6" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
    <text x="168" y="62" text-anchor="middle" font-size="10" fill="#065f46">Worktree</text>

    <!-- Agent subprocess -->
    <rect x="14" y="84" width="202" height="26" rx="6" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
    <text x="115" y="101" text-anchor="middle" font-size="10" font-weight="500" fill="#92400e">Agent: Claude Code / Codex</text>
  </g>

  <!-- Worker B -->
  <g transform="translate(610, 420)">
    <rect width="230" height="120" rx="12" fill="#fff" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
    <rect width="230" height="28" rx="12" fill="#10b981"/>
    <rect y="16" width="230" height="12" fill="#10b981"/>
    <text x="115" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Worker B</text>

    <rect x="14" y="42" width="96" height="32" rx="6" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
    <text x="62" y="62" text-anchor="middle" font-size="10" fill="#065f46">Launcher</text>

    <rect x="120" y="42" width="96" height="32" rx="6" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
    <text x="168" y="62" text-anchor="middle" font-size="10" fill="#065f46">Worktree</text>

    <rect x="14" y="84" width="202" height="26" rx="6" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
    <text x="115" y="101" text-anchor="middle" font-size="10" font-weight="500" fill="#92400e">Agent: Claude Code / Codex</text>
  </g>

  <!-- ==================== Arrows ==================== -->

  <!-- GitHub -> Coordinator: poll issues -->
  <line x1="410" y1="144" x2="410" y2="194" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="418" y="174" font-size="9" fill="#3b82f6">poll issues</text>

  <!-- Coordinator -> GitHub: write comments -->
  <line x1="500" y1="194" x2="500" y2="144" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="508" y="174" font-size="9" fill="#64748b">comments</text>

  <!-- Coordinator -> Worker A: dispatch task -->
  <line x1="370" y1="352" x2="230" y2="418" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="265" y="378" font-size="9" fill="#10b981">dispatch task</text>

  <!-- Coordinator -> Worker B: dispatch task -->
  <line x1="530" y1="352" x2="670" y2="418" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="590" y="378" font-size="9" fill="#10b981">dispatch task</text>

  <!-- Agent A -> GitHub: gh issue edit (labels) -->
  <path d="M 62,420 L 62,120 L 318,120" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-amber)"/>
  <text x="68" y="280" font-size="9" fill="#f59e0b" transform="rotate(-90, 68, 280)">gh issue edit (labels)</text>

  <!-- Agent B -> GitHub: gh pr create -->
  <path d="M 838,420 L 838,108 L 582,108" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-amber)"/>
  <text x="844" y="280" font-size="9" fill="#f59e0b" transform="rotate(-90, 844, 280)">gh pr create / gh issue edit</text>

  <!-- ==================== Legend ==================== -->
  <g transform="translate(30, 56)">
    <rect width="170" height="88" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="12" y="20" font-size="10" font-weight="600" fill="#334155">Legend</text>
    <line x1="12" y1="32" x2="36" y2="32" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="42" y="36" font-size="9" fill="#475569">Control flow</text>
    <line x1="12" y1="50" x2="36" y2="50" stroke="#10b981" stroke-width="1.5"/>
    <text x="42" y="54" font-size="9" fill="#475569">Task dispatch</text>
    <line x1="12" y1="68" x2="36" y2="68" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3"/>
    <text x="42" y="72" font-size="9" fill="#475569">Agent &#8594; GitHub (gh CLI)</text>
  </g>

  <!-- ==================== Flow annotation ==================== -->
  <g transform="translate(680, 196)">
    <rect width="190" height="130" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="12" y="20" font-size="10" font-weight="600" fill="#334155">Cycle</text>
    <text x="12" y="40" font-size="9" fill="#475569">1. Poller detects label</text>
    <text x="12" y="56" font-size="9" fill="#475569">2. State Machine transitions</text>
    <text x="12" y="72" font-size="9" fill="#475569">3. Router picks Worker</text>
    <text x="12" y="88" font-size="9" fill="#475569">4. Agent does the work</text>
    <text x="12" y="104" font-size="9" fill="#475569">5. Agent changes labels</text>
    <text x="12" y="120" font-size="9" fill="#475569">6. Goto 1 (or done)</text>
  </g>
</svg>
