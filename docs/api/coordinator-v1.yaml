openapi: 3.1.0
info:
  title: Workbuddy Coordinator Worker API
  version: v1
  description: >
    Authenticated coordinator API used by remote workers to register,
    long-poll for tasks, report lease heartbeats, submit execution results,
    release claimed tasks, and explicitly unregister when decommissioned.
servers:
  - url: http://localhost:8080
paths:
  /api/v1/workers/register:
    post:
      summary: Register or refresh a worker record
      description: >
        Creates or updates the worker registry entry that binds a worker ID to
        one or more registered repos and supported roles.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterWorkerRequest'
      responses:
        '201':
          description: Worker registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '400':
          description: Invalid request or repo not registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid bearer token when auth is enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Coordinator failed to persist the worker
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/workers/{workerId}:
    delete:
      summary: Unregister a worker
      description: >
        Permanently removes the worker record from the coordinator registry.
        Conservative policy: if the worker currently owns a running task lease,
        unregister is rejected with 409 Conflict instead of releasing the task.
      parameters:
        - $ref: '#/components/parameters/WorkerID'
      responses:
        '200':
          description: Worker removed from the registry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '401':
          description: Missing or invalid bearer token when auth is enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Worker not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Worker currently owns a running task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Coordinator failed to remove the worker
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/tasks/poll:
    get:
      summary: Long-poll for the next dispatchable task
      parameters:
        - name: worker_id
          in: query
          required: true
          schema:
            type: string
        - name: timeout
          in: query
          required: false
          schema:
            type: string
          description: >
            Optional duration string such as 100ms or 30s. When omitted, the
            coordinator uses its default long-poll timeout.
      responses:
        '200':
          description: Task claimed for the worker
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskPollResponse'
        '204':
          description: No task became available before timeout
        '400':
          description: Missing worker_id or unknown worker
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid bearer token when auth is enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Coordinator failed while trying to claim a task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/tasks/{taskId}/result:
    post:
      summary: Report task completion status
      parameters:
        - $ref: '#/components/parameters/TaskID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskResultRequest'
      responses:
        '200':
          description: Completion status recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '400':
          description: Invalid request body or wrong worker for the task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid bearer token when auth is enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Coordinator failed to persist task completion
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/tasks/{taskId}/heartbeat:
    post:
      summary: Extend task lease and refresh worker heartbeat
      parameters:
        - $ref: '#/components/parameters/TaskID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkerIDRequest'
      responses:
        '204':
          description: Heartbeat accepted
        '400':
          description: Invalid request body, wrong worker for the task, or unknown worker
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid bearer token when auth is enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Coordinator failed to refresh worker or task heartbeat
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/tasks/{taskId}/release:
    post:
      summary: Release a claimed task back to pending
      parameters:
        - $ref: '#/components/parameters/TaskID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkerIDRequest'
      responses:
        '204':
          description: Task released to pending
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid bearer token when auth is enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Task is not currently owned by the provided worker
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Coordinator failed to release the task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  parameters:
    TaskID:
      name: taskId
      in: path
      required: true
      schema:
        type: string
    WorkerID:
      name: workerId
      in: path
      required: true
      schema:
        type: string
  schemas:
    RegisterWorkerRequest:
      type: object
      required: [worker_id, repo, roles]
      properties:
        worker_id:
          type: string
        repo:
          type: string
          description: Primary repo in OWNER/NAME form
        repos:
          type: array
          items:
            type: string
          description: >
            Optional explicit repo bindings. If omitted, the primary repo is
            used as the only binding.
        roles:
          type: array
          items:
            type: string
        runtime:
          type: string
          description: Worker runtime capability, for example claude-code or codex
        hostname:
          type: string
    WorkerIDRequest:
      type: object
      required: [worker_id]
      properties:
        worker_id:
          type: string
    TaskResultRequest:
      type: object
      required: [worker_id, status]
      properties:
        worker_id:
          type: string
        status:
          type: string
          enum: [completed, failed, timeout]
        current_labels:
          type: array
          items:
            type: string
    TaskPollResponse:
      type: object
      required: [task_id, repo, issue_num, agent_name, role, payload]
      properties:
        task_id:
          type: string
        repo:
          type: string
        issue_num:
          type: integer
        agent_name:
          type: string
        role:
          type: string
        payload:
          description: Serialized task payload persisted by the coordinator
        worker_id:
          type: string
        lease_expires_at:
          type: string
          format: date-time
    StatusResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
