# Bare OpenTelemetry collector for the workbuddy v0.6 kind smoke
# (REQ-147 / #335). Receives OTLP/gRPC on :4317 and OTLP/HTTP on
# :4318, logs every span to stdout via the `debug` exporter. The
# Makefile's `verify-otel` step greps the collector pod logs for a
# workbuddy span name to assert the exporter wired up.
#
# This is the upstream contrib image with an inline config; not the
# AegisLab-managed collector. Smoke-only.
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: workbuddy-e2e
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch:
        timeout: 1s
    exporters:
      debug:
        verbosity: detailed
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [debug]
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: workbuddy-e2e
spec:
  selector:
    app: otel-collector
  ports:
    - name: grpc
      port: 4317
      targetPort: 4317
    - name: http
      port: 4318
      targetPort: 4318
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: workbuddy-e2e
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: otelcol
          image: otel/opentelemetry-collector-contrib:0.105.0
          args: ["--config=/etc/otel/config.yaml"]
          ports:
            - containerPort: 4317
            - containerPort: 4318
          volumeMounts:
            - name: cfg
              mountPath: /etc/otel
      volumes:
        - name: cfg
          configMap:
            name: otel-collector-config
