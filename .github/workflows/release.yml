name: release

# Trigger after CI passes on main. Tag pushes still produce a release directly.
on:
  workflow_run:
    workflows: ["ci"]
    types:
      - completed
    branches:
      - main
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable corepack
        run: corepack enable

      - name: Build SPA bundle for embed
        run: |
          pnpm -C web install --frozen-lockfile
          pnpm -C web build
          rm -rf internal/webui/dist
          cp -r web/dist internal/webui/dist
          touch internal/webui/dist/.keep

      - name: Compute next version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"
            echo "source=tag" >> "$GITHUB_OUTPUT"
          elif [ -f VERSION ]; then
            version="$(tr -d ' \t\n\r' < VERSION)"
            version="${version#v}"
            echo "source=VERSION" >> "$GITHUB_OUTPUT"
          else
            latest="$(git tag --list 'v*' --sort=-v:refname | head -n1 || true)"
            if [ -z "$latest" ]; then
              version="0.1.0"
            else
              core="${latest#v}"
              maj="${core%%.*}"
              rest="${core#*.}"
              min="${rest%%.*}"
              pat="${rest#*.}"
              version="${maj:-0}.${min:-0}.$(( ${pat:-0} + 1 ))"
            fi
            echo "source=bump" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "Resolved version: v$version"

      - name: Abort if tag already exists
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            if [ "${GITHUB_REF_TYPE:-}" != "tag" ]; then
              echo "Tag $TAG already exists; nothing to release."
              echo "skip=1" >> "$GITHUB_ENV"
            fi
          fi

      - name: Sync plugin version to tag
        if: ${{ env.skip != '1' }}
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          updated=0
          for f in .claude/plugins/workbuddy/.claude-plugin/plugin.json plugins/workbuddy/.codex-plugin/plugin.json; do
            if [ -f "$f" ]; then
              jq --arg v "$VERSION" '.version = $v' "$f" > "${f}.tmp" && mv "${f}.tmp" "$f"
              updated=$((updated + 1))
            fi
          done
          if [ "$updated" -gt 0 ] && ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit --amend --no-edit
            git tag -f "$TAG"
            git push --force origin "$TAG"
          fi

      - name: Cross-compile linux-amd64 + linux-arm64
        if: ${{ env.skip != '1' }}
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist
          commit="$(git rev-parse --short HEAD)"
          date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ldflags="-s -w \
            -X github.com/Lincyaw/workbuddy/cmd.Version=${VERSION} \
            -X github.com/Lincyaw/workbuddy/cmd.Commit=${commit} \
            -X github.com/Lincyaw/workbuddy/cmd.Date=${date}"
          for arch in amd64 arm64; do
            out="dist/workbuddy_${VERSION}_linux_${arch}"
            mkdir -p "$out"
            CGO_ENABLED=0 GOOS=linux GOARCH="$arch" \
              go build -ldflags "$ldflags" -o "$out/workbuddy" .
            tar -C dist -czf "${out}.tar.gz" "$(basename "$out")"
            rm -rf "$out"
          done

      - name: Generate SHA256SUMS
        if: ${{ env.skip != '1' }}
        working-directory: dist
        run: |
          sha256sum *.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Generate release notes
        if: ${{ env.skip != '1' }}
        id: notes
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          prev="$(git tag --list 'v*' --sort=-v:refname | grep -v "^${TAG}$" | head -n1 || true)"
          {
            echo "## ${TAG}"
            echo
            if [ -n "$prev" ]; then
              echo "Changes since ${prev}:"
              echo
              git log "${prev}..HEAD" --pretty=format:'- %s'
            else
              echo "Initial release."
              echo
              git log --pretty=format:'- %s'
            fi
          } > dist/RELEASE_NOTES.md
          echo "---"
          cat dist/RELEASE_NOTES.md

      - name: Create GitHub release
        if: ${{ env.skip != '1' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          if ! git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            git tag "$TAG"
            git push origin "$TAG"
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file dist/RELEASE_NOTES.md \
            dist/*.tar.gz dist/SHA256SUMS
