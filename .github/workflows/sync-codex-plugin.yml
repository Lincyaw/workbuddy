name: sync-codex-plugin

on:
  pull_request:
    paths:
      - ".claude/plugins/workbuddy/**"
      - "scripts/sync_codex_plugin.py"
      - ".github/workflows/sync-codex-plugin.yml"
  push:
    branches:
      - main
    paths:
      - ".claude/plugins/workbuddy/**"
      - "scripts/sync_codex_plugin.py"
      - ".github/workflows/sync-codex-plugin.yml"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Regenerate Codex plugin
        run: python3 scripts/sync_codex_plugin.py

      - name: Verify generated files are committed
        run: |
          set -euo pipefail
          git diff -- .agents/plugins/marketplace.json plugins/workbuddy
          git diff --exit-code -- .agents/plugins/marketplace.json plugins/workbuddy

      - name: Upload generated plugin snapshot
        uses: actions/upload-artifact@v4
        with:
          name: codex-plugin-workbuddy
          path: |
            .agents/plugins/marketplace.json
            plugins/workbuddy/
          if-no-files-found: error
