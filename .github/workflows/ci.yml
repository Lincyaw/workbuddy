name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable corepack
        run: corepack enable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Cache pnpm store + node_modules
        uses: actions/cache@v4
        with:
          path: |
            web/node_modules
            ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install web deps
        run: pnpm -C web install --frozen-lockfile

      - name: make build (SPA + go build)
        run: make build

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./... -count=1

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6

      - name: golangci-lint
        run: golangci-lint run --timeout=5m
        continue-on-error: true

      - name: validate-docs
        run: go run . validate-docs --strict

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate project-index.yaml
        run: python3 scripts/validate_index.py project-index.yaml
