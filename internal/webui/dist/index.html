    <script>
      (function () {
        var mode = 'dark';
        try {
          mode = localStorage.getItem('wb:theme') || 'dark';
        } catch (_) {}
        var resolved = mode;
        if (mode === 'system') {
          resolved = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        }
        document.documentElement.setAttribute('data-theme', resolved === 'light' ? 'light' : 'dark');
      })();
    </script>
