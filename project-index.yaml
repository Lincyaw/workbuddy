  - id: REQ-055
    title: Dispatch cap on status:done and consecutive agent failures
    description: >
      Break runaway re-dispatch loops observed on issues whose agents crash
      repeatedly at the launcher layer or flip verdicts back and forth. The
      coordinator now refuses to dispatch an agent when (a) the issue already
      carries the terminal status:done label, or (b) the same agent has
      accumulated MaxConsecutiveAgentFailures back-to-back failed/timed-out
      tasks on the issue since its last successful run. Blocked dispatches
      emit a typed event and publish a dispatch_blocked alert so operators
      see the condition instead of quietly piling up comments.
    priority: P0
    version: v0.2.0
    status: tested
    acceptance_criteria:
      - "AC-055-1: Store exposes CountConsecutiveAgentFailures(repo, issue, agent) that counts failed/timeout tasks, resetting on the first completed task"
      - "AC-055-2: DispatchAgent refuses to dispatch when the cached issue labels include status:done, emitting eventlog.TypeDispatchBlockedByDone"
      - "AC-055-3: DispatchAgent refuses to dispatch when consecutive failures >= MaxConsecutiveAgentFailures, emitting eventlog.TypeDispatchBlockedByFailureCap"
      - "AC-055-4: Both block paths publish an alertbus.KindDispatchBlocked alert with reason and agent fields"
      - "AC-055-5: A successful task resets the failure count so the cap does not persist across recoveries"
      - "AC-055-6: Unit tests cover each block path and the reset-after-success case"
    code:
      - internal/statemachine/statemachine.go
      - internal/store/store.go
      - internal/eventlog/eventlog.go
      - internal/alertbus/alertbus.go
    tests:
      - internal/statemachine/statemachine_test.go
      - internal/store/store_test.go
    deps: [REQ-001, REQ-017, REQ-030]

  - id: REQ-056
    title: Distinguish launcher infra failures from agent FAIL verdicts
    description: >
      The 107-comment runaway loop on issue #120 was driven by the reporter
      treating launcher-layer crashes (fork/exec failures, missing env vars,
      Rust plugin-cache panics, Go bufio scanner buffer-too-long conditions,
      15-minute codex timeouts) as agent-decided FAIL verdicts. PR #130
      capped these at MaxConsecutiveAgentFailures back-to-back failures, but
      the report comments still misled operators — they read like "the agent
      disagreed with itself," not "the worker is misconfigured." This
      requirement splits the two concepts at the launcher seam: runtimes tag
      pre-LLM failures with Result.Meta[infra_failure]="true"; the reporter
      renders a distinct "Infra Error" header with an explicit "not an agent
      verdict" disclaimer; and the worker paths post the report but do NOT
      call StateMachine.MarkAgentCompleted (which would induce a verdict
      transition). The store still records a failed task so REQ-055's
      dispatch cap continues to bound retries.
    priority: P0
    version: v0.2.0
    status: tested
    acceptance_criteria:
      - "AC-056-1: Runtime detection sets Result.Meta[infra_failure]=true when the process cannot be started (exec.Error pre-LLM), a Rust plugin panic fires before any agent output, or the Go scanner hits a buffer-too-long condition; applies to both Claude and Codex runtimes"
      - "AC-056-2: Reporter renders a distinct 'Infra Error' header (not 'Failure') for infra-failure results; body surfaces the launcher reason and explicitly states this was not an agent verdict"
      - "AC-056-3: In the canonical worker path (`internal/worker/distributed.go`, reached from both `cmd/serve.go` and `cmd/worker.go`) an infra-failure still posts a report comment but does NOT call StateMachine.MarkAgentCompleted with a failure signal; the #130 failure-cap bounds retries"
      - "AC-056-4: A dedicated eventlog entry (eventlog.TypeInfraFailure) is emitted for every infra-failure run"
      - "AC-056-5: Unit tests cover pre-exec launcher error producing Meta[infra_failure] and an 'Infra Error' rendered comment; genuine agent exit!=0 NOT producing Meta[infra_failure] and still rendering as 'Failure'; worker path infra-failure does not call MarkAgentCompleted's fail path"
    code:
      - internal/launcher/infra_failure.go
      - internal/launcher/process.go
      - internal/launcher/claude_stream.go
      - internal/launcher/agent_bridge.go
      - internal/runtime/gha_runner.go
      - internal/launcher/runners/gha/gha.go
      - internal/reporter/format.go
      - internal/reporter/reporter.go
      - internal/eventlog/eventlog.go
      - internal/worker/distributed.go
      - internal/worker/executor.go
      - internal/workerclient/client.go
      - cmd/coordinator.go
      - cmd/serve.go
      - cmd/worker.go
    tests:
      - internal/launcher/infra_failure_test.go
      - internal/runtime/gha_runner_test.go
      - cmd/coordinator_infra_failure_test.go
    deps: [REQ-055]

  - id: REQ-057
    title: Per-issue worker claim with TTL to prevent worker races
    description: >
      On issue #120 two workers (fedora and machine-ddq) were observed taking
      turns dispatching on the same issue within seconds of each other because
      the state machine's in-memory inflight map is cleared on every task
      completion — letting a just-finished-then-immediately-redispatched issue
      race between workers on each cycle. REQ-057 adds a SQLite-backed
      issue_claim table so that only one coordinator can hold a dispatch lease
      on a given (repo, issue) pair at a time. The claim is acquired by the
      StateMachine before dispatchSingleAgent and released when the inflight
      group for that issue finishes. Expired claims are transparently
      overwritten (with a logged claim_expired event) so a crashed coordinator
      cannot wedge an issue indefinitely.
    priority: P0
    version: v0.2.0
    status: tested
    acceptance_criteria:
      - "AC-057-1: New issue_claim(repo, issue_num, worker_id, claim_token, acquired_at, expires_at) table with primary key (repo, issue_num), created by store.createTables"
      - "AC-057-2: Store.AcquireIssueClaim atomically inserts or extends a claim, returning a claim_token on success or ErrIssueClaimHeldByOther when another worker holds an unexpired lease"
      - "AC-057-3: Store.ReleaseIssueClaim deletes the claim only when it belongs to the given worker and reports whether a row was removed"
      - "AC-057-4: Store.RefreshIssueClaim extends expires_at for the current holder, returning false when not held by the worker or already expired"
      - "AC-057-5: StateMachine.DispatchAgent acquires the claim before dispatchSingleAgent; on contention it logs eventlog.TypeDispatchSkippedClaim and returns cleanly, and MarkAgentCompleted releases the claim when the group advances"
      - "AC-057-6: An expired claim does not block; the new acquirer overwrites it and emits eventlog.TypeIssueClaimExpired"
      - "AC-057-7: Default lease is statemachine.DefaultIssueClaimLease (30 minutes); wired through SetIssueClaim from serve.go and repo_runtime.go"
      - "AC-057-8: Unit tests cover acquire-fresh, self-extend, conflict, expired-overwrite, release, and refresh"
    code:
      - internal/store/store.go
      - internal/statemachine/statemachine.go
      - internal/eventlog/eventlog.go
      - cmd/serve.go
      - cmd/repo_runtime.go
      - internal/app/repo_runtime.go
      - internal/app/claim_id.go
    tests:
      - internal/store/store_test.go
      - internal/statemachine/statemachine_test.go
    deps: [REQ-017, REQ-027, REQ-030]

  - id: REQ-058
    title: Worktree isolation safety
    description: >
      Prevent workers from falling back to the main working tree (CWD) when
      git worktree creation fails. Ensure worktree setup is robust against
      stale metadata, supports safe reuse of existing worktrees, and records
      failures as user-visible issue comments.
    priority: P0
    version: v0.2.0
    status: tested
    acceptance_criteria:
      - "AC-058-1: workspace.Manager.Create runs `git worktree prune` before every `git worktree add`"
      - "AC-058-2: When target worktree path exists, is on the expected branch, and has no uncommitted changes, it is reused (no error)"
      - "AC-058-3: When target worktree path exists but is on the wrong branch or has uncommitted changes, Create returns a loud error and remote worker tasks are released back to the queue"
      - "AC-058-4: When `git worktree add` fails for any reason, Create returns a loud error and NEVER falls back to CWD"
      - "AC-058-5: Remote worker (cmd/worker.go) reports worktree failures on the issue as a user-visible comment via Reporter and releases the claimed task back to the coordinator queue"
      - "AC-058-6: Embedded router (internal/router/router.go) reports worktree failures on the issue as a user-visible comment via Reporter and updates the task status to failed"
      - "AC-058-7: Unit tests cover stale metadata + prune rescue, existing-clean reuse, existing-dirty refuse, and stale-add failure"
      - "AC-058-8: When multiple agents share the same per-issue worktree (dev→review handoff), Manager tracks active references; Remove decrements the count and only performs the actual git worktree remove + branch delete when the last reference releases, so a late defer from a finished agent does not invalidate cwd for a still-running agent"
    code:
      - internal/workspace/workspace.go
      - internal/worker/distributed.go
      - internal/worker/executor.go
      - cmd/worker.go
      - internal/router/router.go
      - cmd/serve.go
    tests:
      - internal/workspace/workspace_test.go
      - cmd/worker_test.go
      - internal/router/router_test.go
    deps: [REQ-028, REQ-017]

  - id: REQ-059
    title: Issue claim token fencing and deterministic lease tests
    description: >
      Harden REQ-057 so issue-claim release and refresh operations are fenced
      by both worker_id and claim_token, preventing a restarted coordinator or
      reused hostname-based id from mutating a claim it no longer owns. Make
      claimer IDs process-scoped in serve/coordinator runtime paths, and add a
      configurable store clock so expiry tests advance logical time instantly
      instead of sleeping on wall time.
    priority: P0
    version: v0.2.0
    status: tested
    acceptance_criteria:
      - "AC-059-1: Store.ReleaseIssueClaim deletes only when repo, issue_num, worker_id, and claim_token all match"
      - "AC-059-2: Store.RefreshIssueClaim extends expires_at only when worker_id and claim_token match the current unexpired holder"
      - "AC-059-3: StateMachine wires claimTokens through releaseIssueClaim so stale in-memory completions cannot delete a replaced claim, and stale map entries are removed"
      - "AC-059-4: cmd/serve.go and cmd/repo_runtime.go derive claimer IDs with a process-unique suffix so two coordinator processes on the same host never share a logical owner id"
      - "AC-059-5: Store exposes a configurable clock used by issue-claim expiry logic so tests advance logical time without >100ms wall-time sleeps"
      - "AC-059-6: AcquireIssueClaim's held-by-other commit error names the operation accurately instead of referring to a rollback conflict"
      - "AC-059-7: Unit tests cover token-aware release/refresh, stale-token state-machine release protection, process-scoped claimer IDs, and deterministic expiry/refresh timing"
    code:
      - internal/store/store.go
      - internal/statemachine/statemachine.go
      - cmd/claim_id.go
      - cmd/serve.go
      - cmd/repo_runtime.go
      - internal/app/claim_id.go
      - internal/app/repo_runtime.go
    tests:
      - internal/store/store_test.go
      - internal/statemachine/statemachine_test.go
    deps: [REQ-057]

