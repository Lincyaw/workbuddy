  - id: REQ-085
    title: Browser cookie auth for coordinator HTTP surface
    description: >
      `WrapAuth` previously accepted only `Authorization: Bearer <token>`
      headers, which meant a session-viewer link clicked from a GitHub
      comment had no way to authenticate (browsers cannot attach the bearer
      header). This requirement adds an opt-in cookie path: WrapAuth now
      also accepts the `wb_session` cookie, while a new `/login` form sets
      that cookie and `/logout` clears it. API clients keep the original
      Bearer header path (and 401 JSON when unauthenticated); browsers get
      a 302 redirect to /login when they ask for HTML. A `--cookie-insecure`
      flag drops the cookie's `Secure` attribute for HTTP reverse-proxy
      fronts that explicitly accept the trade-off. The cookie value is the
      bearer token itself - no server-side session table - per the parent
      design (#215).
    priority: P1
    version: v0.5.0
    status: tested
    acceptance_criteria:
      - "AC-085-1: `Authorization: Bearer <token>` keeps returning 200 on protected routes (backwards compatibility)"
      - "AC-085-2: `Cookie: wb_session=<token>` returns 200 on protected routes"
      - "AC-085-3: HTML clients (Accept contains text/html) without credentials get 302 to `/login?next=<encoded path>`"
      - "AC-085-4: API clients without credentials still get 401 JSON `{\"error\":\"unauthorized\"}`"
      - "AC-085-5: `POST /login` with a valid token sets `wb_session` cookie with HttpOnly+Secure+SameSite=Strict and 302s to next or /"
      - "AC-085-6: `POST /login` with an invalid token re-renders the form with an error message and no Set-Cookie"
      - "AC-085-7: `POST /logout` clears the cookie (Max-Age=-1) and 302s to /login"
      - "AC-085-8: `--cookie-insecure` drops the Secure attribute while keeping HttpOnly and SameSite=Strict"
      - "AC-085-9: Worker token authentication path (store.AuthenticateWorkerToken) is unchanged"
      - "AC-085-10: Unit tests cover header/cookie/missing-credential WrapAuth paths plus /login success and failure; integration test covers full POST /login ã cookie GET flow"
    code:
      - internal/app/coordinator.go
      - internal/app/auth_handlers.go
      - cmd/coordinator.go
      - cmd/serve.go
    tests:
      - internal/app/auth_handlers_test.go
      - internal/app/coordinator_test.go
      - cmd/coordinator_audit_test.go
    deps: [REQ-019]

  - id: REQ-086
    title: Devãreview cycle counter, cap, and long-flight stuck detector
    description: >
      Issue #210 ran 7 devãreview cycles over ~2h15min with no built-in cap.
      This requirement adds an orchestrator-level cycle counter, a workflow-
      configurable cap, a rejection-trail digest comment on cap-hit, a long-
      flight stuck signal independent of per-state dwell, and operator-visible
      cycle counts in `workbuddy status` and the dashboard API.

      `dev_review_cycle_count` increments on every developingãreviewingã
      developing round-trip (detected at state-entry into developing when the
      persisted workflow_instance.current_state is reviewing). On reaching
      `max_review_cycles` (workflow frontmatter; default 3) the StateMachine
      stops dispatching dev-agent / review-agent for the issue, emits
      `dev_review_cycle_cap_reached` event + alert, and posts a needs-human
      comment whose rejection-trail digest is assembled from existing
      `completed` events (no agent re-invocation). At `cycles == cap-1` the
      Coordinator publishes `dev_review_cycle_approaching` so the notifier
      can fire a heads-up.

      The audit and auditapi handlers expose `dev_review_cycle_count`,
      `first_dispatch_at`, and a derived `long_flight` boolean (>4h since
      first dispatch) so `workbuddy status --stuck` can surface dwell-time
      and long-flight stuck signals independently. `workbuddy issue restart`
      clears the per-issue cycle state so a human-resolved issue can be
      requeued without manual SQL.

      Per the maintainer override comment on issue #214, the cycle counter
      uses Option A reset semantics: when a human flips status:blocked ã
      status:developing, the StateMachine clears `dev_review_cycle_count`
      and `cap_hit_at` so the cap re-engages from zero. The
      blockedãdeveloping label transition itself does not count as a
      round-trip. The reset is detected via the persisted
      workflow_instance.current_state, which now advances through stateless
      states (e.g. blocked, done) so the prior-state check is reliable.

      Architectural note (deviation from literal AC-085-2): the Coordinator
      does NOT auto-flip `status:blocked` from Go code, since the project's
      GH call boundary forbids label writes from Coordinator. Instead, on
      cap-hit the Coordinator (a) blocks all further dispatch for the issue,
      (b) records `cap_hit_at`, and (c) posts a needs-human comment with
      explicit instructions to flip the label or run `workbuddy issue
      restart`. The dispatch block is enforced at the orchestration layer
      regardless of label state, so the user-visible effect ("agent stops
      retrying after the cap") is identical to an auto-flip.
    priority: P1
    version: v0.5.0
    status: tested
    acceptance_criteria:
      - "AC-086-1: `dev_review_cycle_count` increments per developingãreviewingãdeveloping round-trip and is visible at `/api/v1/issues/<repo>/<num>` and on the local audit /issues/.../state surface"
      - "AC-086-2: `max_review_cycles` is read from workflow frontmatter (default 3); on cap-hit dispatch is blocked and a needs-human comment is posted with a rejection-trail digest assembled by Coordinator Go code"
      - "AC-086-3: The needs-human comment uses FormatCycleCapReport and includes cycle count, cap, hit-time, and per-rejection digest entries"
      - "AC-086-4: The audit IssueStateResponse exposes `long_flight` true when first_dispatch_at is older than 4h and the issue is open in an intermediate state, independent of per-state dwell"
      - "AC-086-5: `workbuddy status` renders `cycles=N` inline with the CYCLES column for any issue with `dev_review_cycle_count > 0`"
      - "AC-086-6: Notifier publishes `dev_review_cycle_approaching` at cycles == cap-1 so an operator heads-up notification can fire"
      - "AC-086-7: Tests cover clean issue (no extra cycle), 1-cycle issue, cap-hit issue (auto-block + digest), long-flight issue without cycles"
      - "AC-086-8: `workbuddy issue restart` clears the issue_cycle_state row and reports cycle_state_cleared"
      - "AC-086-9: Cycle counter resets on a human-driven status:blocked ã status:developing label transition (Option A reset), preserving the maintainer-stated 'give the agent another shot' semantic; the blockedãdeveloping transition itself does not count as a round-trip"
    code:
      - internal/config/types.go
      - internal/config/loader.go
      - internal/store/store.go
      - internal/store/queries.go
      - internal/store/types.go
      - internal/statemachine/statemachine.go
      - internal/eventlog/eventlog.go
      - internal/alertbus/alertbus.go
      - internal/audit/http.go
      - internal/auditapi/handler.go
      - internal/reporter/reporter.go
      - internal/reporter/format.go
      - internal/app/cycle_cap.go
      - internal/app/repo_runtime.go
      - cmd/admin_restart_issue.go
      - cmd/status.go
      - .github/workbuddy/workflows/default.md
      - schemas/workflow.schema.json
      - CLAUDE.md
    tests:
      - internal/statemachine/cycle_cap_test.go
      - internal/store/queries_cycle_state_test.go
      - internal/audit/http_long_flight_test.go
      - internal/reporter/cycle_cap_format_test.go
      - cmd/admin_restart_issue_test.go
    related_docs:
      - .github/workbuddy/workflows/default.md
      - CLAUDE.md
    deps: [REQ-021, REQ-085]

  - id: REQ-087
    title: Mandatory --report-base-url for non-loopback coordinator/serve binds
    description: >
      The Reporter writes session links into GitHub issue comments using a
      configurable base URL. Historically the URL was silently derived from
      the coordinator listen address, so a deploy that bound 0.0.0.0 (or a
      reverse-proxied host) would post comments containing 127.0.0.1 links
      that no operator could click. This requirement makes --report-base-url
      an enforced contract: when --listen is non-loopback the flag (or the
      WORKBUDDY_REPORT_BASE_URL env var) must be set and resolve to a
      non-loopback host; when --listen is loopback the value remains optional
      and defaults to http://<listen>. The same policy applies to the worker
      management bind: a non-loopback --mgmt-addr now requires a
      non-loopback --mgmt-public-url so coordinator-proxied session links
      stay reachable. All failure modes return actionable errors that name
      the missing flag and a fix-it example.
    priority: P1
    version: v0.4.0
    status: tested
    acceptance_criteria:
      - "AC-087-1: workbuddy coordinator with non-loopback --listen and no --report-base-url (and no WORKBUDDY_REPORT_BASE_URL env var) fails fast with a message that names the missing flag and shows a --report-base-url=http://<your-host>:<port> fix-it"
      - "AC-087-2: workbuddy coordinator with non-loopback --listen and a loopback --report-base-url fails fast with a message naming the loopback URL and the same fix-it"
      - "AC-087-3: workbuddy coordinator with non-loopback --listen and a non-loopback --report-base-url succeeds and stores the value on coordinatorOpts so the Reporter sees it"
      - "AC-087-4: workbuddy coordinator with loopback --listen and no --report-base-url succeeds, defaulting to http://<listen>"
      - "AC-087-5: workbuddy serve with non-loopback --listen and no --report-base-url fails fast with the same diagnostic surface; loopback bind keeps working without the flag"
      - "AC-087-6: workbuddy worker with non-loopback --mgmt-addr fails fast unless --mgmt-public-url is set to a non-loopback URL; the error names --mgmt-public-url=http://<your-worker-host>:<port> as the fix"
      - "AC-087-7: WORKBUDDY_REPORT_BASE_URL is honored as a fallback for both coordinator and serve when the flag is unset"
      - "AC-087-8: cmd/init.go config.yaml template carries a # report_base_url placeholder explaining the non-loopback requirement"
      - "AC-087-9: cmd/deploy.go install Examples demonstrate --report-base-url and --env-file usage so systemd deployments wire the env var through"
    code:
      - cmd/coordinator.go
      - cmd/deploy.go
      - cmd/init.go
      - cmd/report_base_url.go
      - cmd/serve.go
      - cmd/worker.go
      - cmd/worker_repos.go
    tests:
      - cmd/coordinator_test.go
      - cmd/report_base_url_test.go
      - cmd/serve_test.go
      - cmd/worker_repos_test.go
      - cmd/worker_test.go
    related_docs:
      - docs/implemented/distributed-topology-and-cli.md
    deps: [REQ-027, REQ-028, REQ-029, REQ-051]

