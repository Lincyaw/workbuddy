  - id: REQ-120
    title: Worker-side session audit HTTP server (Phase 1 of session-data ownership refactor)
    description: >
      In the v0.5 3-unit bundle the worker writes session rows into its own
      .workbuddy/worker.db while the coordinator's audit API reads
      .workbuddy/workbuddy.db. There is no replication channel, so every
      session created since the cutover is invisible to the audit API and
      falls into the synthesized aborted_before_start path. Phase 1 of the
      session-data ownership refactor stands up a worker-side audit HTTP
      server that reads from the worker's own DB, and extends the
      workerãcoordinator register protocol to advertise that audit URL.
      Phase 2 will rewire the coordinator to proxy session reads to the
      owning worker; Phase 3 will delete the legacy synthesis paths. See
      docs/decisions/2026-05-01-session-data-ownership.md.
    priority: P0
