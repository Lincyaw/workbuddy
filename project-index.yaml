  - id: REQ-121
    title: Coordinator session proxy + fan-out (Phase 2 of session-data ownership refactor)
    description: >
      Phase 2 of the session-data ownership refactor (REQ-120). Rewires the
      coordinator-side /api/v1/sessions and /api/v1/sessions/{id}[/events|
      /stream] handlers to resolve the owning worker via workers.audit_url
      and reverse-proxy / fan-out to that worker, instead of reading from the
      coordinator's own DB. Single-session detail and SSE pass-through
      forward the coordinator's bearer token; SSE preserves event/id/data
      framing with per-chunk flushes and propagates browser disconnects
      upstream. The list endpoint fans out across all candidate workers
      (filtered by repo when provided), merges + dedupes by session_id,
      sorts by created_at desc, paginates, and surfaces unreachable workers
      via an X-Workbuddy-Worker-Offline header (and reserved envelope
      field) without failing the call. A 5-second in-memory cache fronts
      the listing. Coordinator-side disk-only synthesis is turned off:
      the worker now reports its sessions truthfully. See
      docs/decisions/2026-05-01-session-data-ownership.md.
