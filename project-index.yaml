      coordinator-owned issue_claim rows must be swept on startup, graceful
      shutdown must release the current coordinator's tracked claims, claim
      contention must become operator-visible, and operators need a first-class
      restart command instead of ad-hoc SQLite surgery.
    priority: P0
    version: v0.2.0
