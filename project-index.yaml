  - id: REQ-125
    title: deploy redeploy/upgrade preserves supervisor for hot-reload
    description: >
      Before this change, `workbuddy deploy redeploy --all` and `workbuddy
      deploy upgrade --all` cold-restarted every unit in the bundle,
      including the supervisor. The supervisor's whole design intent is to
      outlive worker/coordinator restarts so in-flight agent processes it
      owns survive ã restarting it on every binary swap defeats that. The
      new default is: replace the binary on disk for all three units, but
      skip the supervisor's systemd restart. Operators who really need the
      supervisor's process to pick up the new binary can pass
      `--include-supervisor` to opt back into the old behaviour. This is
      the realistic hot-reload contract the bundle topology can deliver:
      worker/coordinator restarts that the supervisor stitches across.
    priority: P1
    version: v0.6.0
    status: tested
    acceptance_criteria:
      - "AC-125-1: deploymentRoleFromManifest returns supervisor/coordinator/worker/serve from the first non-flag positional argument of the manifest command, lowercased; nil and flag-only manifests return empty string."
      - "AC-125-2: shouldRestartUnit returns (false, non-empty reason) for role==supervisor when includeSupervisor=false, and (true, \"\") in every other case; --include-supervisor=true returns (true, \"\") even for supervisor."
      - "AC-125-3: deployRedeployCmd and deployUpgradeCmd register a `--include-supervisor` boolean flag (default false) and parseDeployLookupFlags reads it into deployLookupOpts.includeSupervisor."
      - "AC-125-4: runDeployRedeployRecord and runDeployUpgradeRecord always copy the binary and rewrite the manifest, then dispatch to syncSystemdDeploymentStateRestart with the restart decision computed from the manifest role and the flag ã when restart is skipped, the output reads `left <unit> running (<reason>)` instead of `restarted <unit>`."
      - "AC-125-5: TestDeploymentRoleFromManifest and TestShouldRestartUnit_PreservesSupervisor cover the helper contract; the existing deploy test suite still passes."
    code:
