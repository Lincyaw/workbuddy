    version: v0.6.0
    status: tested
    acceptance_criteria:
      - "AC-121-1: coordinator's /api/v1/sessions/{id} reverse-proxies to the owning worker's audit_url and forwards Authorization: Bearer <WORKBUDDY_AUTH_TOKEN>; status code + body pass through unchanged."
