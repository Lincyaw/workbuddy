      pipeline-monitor skill — detects stuck issues, missed redispatches,
      orphaned tasks, and repeated failures, then suggests or auto-applies
      safe fixes (cache invalidation). Replaces manual sqlite3 queries
      and human judgment for common failure modes.
    priority: P2
    version: v0.2.0
    status: tested
    acceptance_criteria:
      - "AC-037-1: `workbuddy diagnose [--repo R] [--fix] [--json]` 扫描 task_queue + events + issue_cache + issue_dependency_state 表，输出诊断结果"
      - "AC-037-2: 检测 stuck issue：中间状态（status:developing/reviewing）+ 无 active task（pending/running）+ 最后事件距今 > 1 hour"
      - "AC-037-3: 检测 missed redispatch：issue_dependency_state.verdict=ready + 无 active task + issue 仍在中间状态"
      - "AC-037-4: 检测 orphaned task：task_queue.status=running + updated_at 距今 > 2x agent timeout（默认 60min）"
      - "AC-037-4a: 额外检测 heartbeat-only zombie：session artifact（events-v1.jsonl / codex-exec.jsonl）mtime 距今 > 2x worker.stale_inference.idle_threshold，诊断文案区分 `session log static`"
      - "AC-037-4b: 额外检测 heartbeat-only zombie：task 已运行超过 grace period 且 worktree 下无匹配的 codex/claude 子进程，诊断文案区分 `no child process`"
      - "AC-037-5: 检测 repeated failure：同一 repo+issue_num+agent_name 在 task_queue 中连续 failed >= 3 条"
      - "AC-037-6: 每条诊断输出 ISSUE, SEVERITY(warn/error), DIAGNOSIS, SUGGESTED_FIX"
      - "AC-037-7: --fix 自动执行 cache-invalidate 类修复（stuck 和 missed redispatch），并可将 heartbeat-only zombie 任务标记为 completed/failed，记录 event；对 repeated failure 只报告不修复"
      - "AC-037-8: --fix 执行的每个修复操作在 events 表记录 type=auto_fix 事件"
      - "AC-037-9: 直连 SQLite，不依赖 serve 运行"
