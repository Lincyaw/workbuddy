      - "AC-111-3: GET /api/v1/sessions/:id keeps the REQ-110 degraded behavior when metadata.json.Status is terminal (completed/failed/timeout/aborted_before_start)."
      - "AC-111-4: GET /api/v1/sessions applies the same heuristic when enumerating disk-only sessions ã a live in-flight row carries status=running + degraded=false."
