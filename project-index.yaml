      - "AC-017-6: serve 与 split deployment 共享同一个 worker 实现和 reporter comment 形状"
      - "AC-017-7: 监听 SIGINT/SIGTERM，graceful shutdown：停止 poller → 等待 agent（最多 60s）→ 关闭 HTTP"
