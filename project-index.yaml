      - "AC-099-4: long tool_use input or tool_result bodies are collapsed to a ~10-line preview with an Expand control."
      - "AC-099-5: codex worker output (`{method, params}` JSON-RPC) routes to a codex-specific renderer when `meta.runtime === 'codex'`."
      - "AC-099-6: consecutive timeline events that share a `turn_id` are grouped under a single turn boundary."
      - "AC-099-7: vitest covers the parser (system / user / assistant / tool_result / result / codex / malformed) and the renderer (each message kind + collapsed long body + ERROR badge)."
      - "AC-099-8: codex structured session events (`agent.message`, `reasoning`, `command.exec`, `tool.result`) render through the same Pretty timeline cards as claude sessions, with `command.output` suppressed to avoid duplicate output and assistant deltas collapsed per turn."
      - "AC-099-9: vitest covers the codex structured-event adapter plus a SessionDetail integration fixture for codex, while a claude log fixture proves the existing `kind=log` pretty rendering remains unchanged."
