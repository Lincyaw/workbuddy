  - id: REQ-108
    title: webui session events ã drop server-side payload truncation (#276)
    description: >
      The /api/v1/sessions/{id}/events endpoint previously truncated any string
      longer than 4000 bytes and any array longer than 200 elements inside the
      decoded payload. That broke `kind=log` events whose `payload.line` is
      itself a JSON document the SPA re-parses (Claude Code stream-json), since
      the server cut mid-string and the client's `JSON.parse(line)` failed with
      "Unterminated string". This requirement removes both guards so each event
      mirrors the on-disk record verbatim. The `truncated` field is retained on
      the wire for backward compatibility with older SPA bundles but is never
      set to true.
    rationale: >
      The original truncation was added as a wire-size guard, but `payload.line`
      and tool-call arrays are exactly the artefacts an operator opens the
      session detail page to read. The single remaining size guard is the
      `limit` query parameter (default 200, capped at 1000) so a session page
      cannot accidentally ask for ten thousand events at once.
    priority: P1
    version: v0.5.0
    status: tested
    acceptance_criteria:
      - "AC-108-1: internal/webui/handler.go no longer truncates strings or arrays inside payload ã the decoded payload is passed through verbatim."
      - "AC-108-2: trimmedEvent.Truncated is retained on the wire (json:\"truncated,omitempty\") but is never set to true by the server."
      - "AC-108-3: The events endpoint still respects the limit query parameter (default 200, capped at 1000); only per-event slimming was removed."
      - "AC-108-4: TestEventsAPINoTruncation seeds a payload with a 64KB inner JSON string and a 500-element array, asserts the API returns both at exact input length, asserts truncated=false, and asserts the returned `line` is still parseable as JSON (the SPA's JSON.parse(line) contract)."
    code:
      - internal/webui/handler.go
    tests:
      - internal/webui/handler_test.go
    deps:
      - REQ-091

  - id: REQ-109
    title: SessionDetail event-stream race fix ã fetch must merge with SSE-arrived events
    description: >
      On slow networks the session detail page intermittently flashed events
      and then blanked them: the initial REST fetch and the SSE subscription
      both started in the same render, and when SSE arrived first the fetch
      handler called `setEvents(next)` with a fresh array whose dedupe filter
      had already eaten 0..N ã wiping the SSE-rendered events out of state.
      A new `mergeSessionEvents` utility funnels both code paths through one
      functional update that dedupes by `index` (using the shared `seenRef`
      set) and sorts by `index`, so out-of-order arrivals stay monotonic and
      neither path can clobber the other. The clearTimeline re-subscribe
      path uses the same helper. Vitest covers the SSE-before-fetch race,
      the fetch-then-SSE flow, overlapping-batch dedupe, out-of-order sort,
      and input-array immutability.
    priority: P1
    version: v0.5.0
    status: tested
    acceptance_criteria:
      - "AC-109-1: `web/src/utils/sessionEvents.ts` exports `mergeSessionEvents(prev, incoming, seen)` that dedupes by `index` against a caller-owned `Set<number>`, returns a new sorted array, and never mutates `prev`."
      - "AC-109-2: `web/src/pages/SessionDetail.tsx` initial-fetch handler uses a functional `setEvents` update that runs through `mergeSessionEvents` instead of `setEvents(next)`; SSE handlers and the clearTimeline re-subscribe path use the same helper."
      - "AC-109-3: vitest in `web/src/utils/sessionEvents.test.ts` simulates SSE pushing events 0/1/2 before fetch resolves with 0/1/2/3/4 and asserts the final state has length 5 with strictly monotonic indices."
      - "AC-109-4: vitest covers fetch-resolve-first then SSE pushes 5/6 with no duplicates and no loss; also covers out-of-order arrival sorting and dedupe across overlapping batches."
      - "AC-109-5: `pnpm -C web build` and `pnpm -C web test` both succeed."
    code:
      - web/src/pages/SessionDetail.tsx
      - web/src/utils/sessionEvents.ts
    tests:
      - web/src/utils/sessionEvents.test.ts
    deps:
      - REQ-091

  - id: REQ-110
    title: "Surface aborted-before-start sessions as degraded in API + SPA (#275)"
    description: >
      The auditapi /api/v1/sessions/:id endpoint returns degraded=true +
      degraded_reason when no agent_sessions DB row exists (response
      synthesized from disk metadata.json) or when the events-v1.jsonl
      artefact is missing on a session that is already in a terminal
      status. Status is rewritten to `aborted_before_start` and exit_code
      defaults to -1 when the session never reported a real exit. The
      sessions list endpoint enumerates disk-only sessions with the same
      degraded marker. The SPA shows a red warning card on SessionDetail
      and a warning badge on the Sessions list so operators can tell apart
      "ran-and-emitted-nothing" from "aborted-before-start".
    rationale: >
      Issue #275: a session whose runtime aborted before start was being
      rendered identically to a normal-but-empty session (status:
      completed, exit_code 0, empty timeline). Operators had to dig into
      raw metadata.json by hand to see the truth. The degraded marker
      makes the failure mode visible at a glance.
