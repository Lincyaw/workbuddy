  - id: REQ-092
    title: Local agent supervisor process + IPC API (Phase 1 step 1 of #224)
    description: >
      Introduce `workbuddy supervisor`, a long-lived per-host process that
      owns agent subprocesses on behalf of (potentially transient) workbuddy
      worker processes. The supervisor binds a unix socket
      (`$XDG_RUNTIME_DIR/workbuddy-supervisor.sock`) and exposes an HTTP API
      to start, observe (status + SSE event tail), cancel, and list agents.
      Subprocess stdout/stderr are written directly to per-agent files under
      `$XDG_STATE_HOME/workbuddy/agents/<id>.{stdout,stderr}` (no pipes), so
      the supervisor can restart and continue tailing. A mini SQLite DB
      (`$XDG_STATE_HOME/workbuddy/supervisor.db`) records each agent and its
      `/proc/<pid>/stat` starttime ticks; on restart the supervisor verifies
      live agents by re-reading starttime to defend against pid reuse.
      Children are launched with `setsid` so the supervisor's lifetime is
      independent of theirs (KillMode=process friendly). This issue ships the
      supervisor only; worker integration and systemd unit work are deferred
      to Phase 1 steps 2 and 3 respectively (#224).
    priority: P1
    version: v0.6.0
    status: tested
    acceptance_criteria:
      - "AC-092-1: `workbuddy supervisor` binds a unix socket (default `$XDG_RUNTIME_DIR/workbuddy-supervisor.sock`) and serves the HTTP IPC API; --socket and --state-dir override defaults."
      - "AC-092-2: `POST /agents` accepts `{runtime,args,workdir,env,session_id}`, starts the subprocess, and returns `{agent_id, started_at}` immediately."
      - "AC-092-3: `GET /agents/:id` returns `{status: running|exited, exit_code, session_id, pid, runtime, workdir, started_at}`."
      - "AC-092-4: `GET /agents/:id/events` is an SSE stream of stdout lines tagged with their 1-indexed offset; `?from_offset=N` skips the first N lines so a client can resume."
      - "AC-092-5: `POST /agents/:id/cancel` sends SIGTERM and escalates to SIGKILL after the configured grace; `GET /agents` lists every known agent."
      - "AC-092-6: stdout/stderr are persisted to `<state_dir>/agents/<id>.{stdout,stderr}` (no pipes), and a SQLite row in `<state_dir>/supervisor.db` captures `(agent_id, pid, start_time, status, exit_code, session_id, runtime, workdir, start_ticks)`."
      - "AC-092-7: On restart the supervisor reloads agents from SQLite and validates running ones by comparing `/proc/<pid>/stat` field 22 (starttime) with the recorded value; mismatched rows are flipped to `exited`."
      - "AC-092-8: Children are started with `Setsid=true` so they lead their own session/process group and survive supervisor exits (KillMode=process friendly)."
      - "AC-092-9: Worker code paths (`internal/runtime/`, `cmd/worker.go`) are not touched by this issue; integration is left to Phase 1 step 2."
    code:
      - cmd/supervisor.go
      - internal/supervisor/supervisor.go
      - internal/supervisor/agent.go
      - internal/supervisor/store.go
      - internal/supervisor/proc.go
    tests:
      - internal/supervisor/supervisor_test.go
    deps: []

  - id: REQ-093
    title: CICD pipeline (pull-based) — ci.yml + release.yml + PR template
    description: >
      GitHub Actions for fast PR feedback and pull-based release artifacts.
      `ci.yml` runs on PR + push to main: setup-go (from go.mod) + setup-node
      with corepack + pnpm, `make build` (SPA + go build), `go vet`,
      `go test ./... -count=1`, `golangci-lint run`, `go run . validate-docs
      --strict`, and an inline yaml validator
      (`scripts/validate_index.py`) since the autoharness script is not
      available on the runner. `release.yml` is triggered by the CI workflow
      finishing successfully on main (and by tag pushes for manual
      releases): it computes the next version from a `VERSION` file or by
      bumping the latest `v*` tag's patch component, cross-compiles
      linux-amd64 + linux-arm64 with `CGO_ENABLED=0`, generates
      `SHA256SUMS`, builds release notes from the commit log between the
      previous tag and HEAD, and calls `gh release create vX.Y.Z` with the
      tarballs + checksum file. The PR template gains a schema/API
      compatibility checkbox per the parent issue's compatibility contract.
      The release artifacts are the contract surface that Phase 2.2's
      `deploy watch` consumes.
    priority: P1
    version: v0.5.0
    status: tested
    acceptance_criteria:
      - "AC-093-1: `.github/workflows/ci.yml` triggers on `pull_request` and `push` to `main`, runs setup-go (go-version-file: go.mod), setup-node@22 with corepack enabled, `pnpm -C web install --frozen-lockfile`, `make build`, `go vet ./...`, `go test ./... -count=1`, `golangci-lint run`, `go run . validate-docs --strict`, and `python3 scripts/validate_index.py project-index.yaml`."
      - "AC-093-2: `.github/workflows/release.yml` fires on `workflow_run` of `ci` completing successfully on `main` (and on `v*` tag push), only proceeds when `workflow_run.conclusion == 'success'`, and skips cleanly if the resolved tag already exists."
      - "AC-093-3: Release job resolves the next version by reading a `VERSION` file when present and otherwise bumping the patch component of the most recent `v*` tag (or `0.1.0` if no tags exist)."
      - "AC-093-4: Release job cross-compiles linux/amd64 and linux/arm64 with `CGO_ENABLED=0`, packages each as `workbuddy_<version>_linux_<arch>.tar.gz`, generates `SHA256SUMS`, builds release notes from `git log <prev-tag>..HEAD --pretty=format:'- %s'`, and uploads the tarballs + `SHA256SUMS` via `gh release create`."
      - "AC-093-5: `.github/pull_request_template.md` contains the schema/API compatibility checkbox `- [ ] schema/API 兼容（只加列、加端点，不删/不改字段）`."
      - "AC-093-6: `scripts/validate_index.py` exists in-repo, validates required fields, unique IDs, valid priority/status, and existing code/test paths, exits non-zero on violations, and passes against the current `project-index.yaml`."
    code:
