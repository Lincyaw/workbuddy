      - "AC-120-2: the audit listener requires Authorization: Bearer <WORKBUDDY_AUTH_TOKEN> on every /api/v1/* request, and refuses to start when the token is empty (fail-closed)."
      - "AC-120-3: `workbuddy worker` accepts --audit-listen (default 127.0.0.1:0; '' or 'disabled' opts out) and --audit-public-url for split-host advertised URLs."
      - "AC-120-4: `workerclient.RegisterRequest` carries audit_url, the coordinator's /api/v1/workers/register handler reads it, and the workers table persists it via a new audit_url column added by ALTER TABLE migration."
      - "AC-120-5: tests cover bearer-auth gating, list/detail/events happy paths, the no-disk-only-synthesis behavior, the migration adding audit_url to existing rows without data loss, and an integration round-trip exercising register + audit GET."
    code:
