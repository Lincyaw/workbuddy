  - id: REQ-094
    title: State-machine dispatch logs distinguish intent from outcome (#241)
    description: >
      The state-entry log line previously read "dispatching agents %q",
      which was misleading: dispatch can still be vetoed downstream by the
      dependency gate (`isBlockedByDependency`) before the task ever enters
      the dispatch channel. Operators reading `journalctl` saw the issue as
      "dispatched" when it was actually blocked. Re-word the state-entry
      line to "candidate agents=%q" (intent only), add a
      `[statemachine] dispatched %s for %s#%d state=%s` line in
      `dispatchSingleAgent` immediately after the request enters the
      dispatch channel (true outcome), and add a
      `[statemachine] dispatch blocked by dependency: ... verdict=%s` line
      in `isBlockedByDependency` so blocking reasons surface in the system
      log next to the existing `dispatch_blocked_by_dependency` event. The
      event payload is unchanged for backwards compatibility.
    priority: P2
    version: v0.6.0
    status: tested
    acceptance_criteria:
      - "AC-094-1: `internal/statemachine/statemachine.go` state-entry log uses neutral wording (`candidate agents=`), not `dispatching agents`."
      - "AC-094-2: `dispatchSingleAgent` emits `[statemachine] dispatched <agent> for <repo>#<n> state=<state>` after the dispatch request is accepted by the channel."
      - "AC-094-3: `isBlockedByDependency` emits `[statemachine] dispatch blocked by dependency: <repo>#<n> agent=<a> verdict=<v>` whenever it returns blocked, alongside the existing `dispatch_blocked_by_dependency` event (unchanged payload)."
      - "AC-094-4: Tests assert that the gate-passed path produces the `dispatched ...` log line and the gate-blocked path does not (and additionally produces the new `dispatch blocked by dependency` line)."
    code:
      - internal/statemachine/statemachine.go
    tests:
      - internal/statemachine/statemachine_test.go
    deps: []

  - id: REQ-095
    title: Pull-based release watcher (`workbuddy deploy watch` + rollback) — Phase 2 step 2 of #224
    description: >
      Add `workbuddy deploy watch`, a long-running poller that periodically
      checks the configured GitHub repository for the newest release and, on a
      newer tag, downloads the matching `linux-${ARCH}` archive, verifies the
      SHA256 entry from `checksums.txt`, atomically replaces the deployed
      `workbuddy` binary (default `/usr/local/bin/workbuddy`), backs up the
      previous binary into `<state-dir>/previous-binary`, and `systemctl
      restart`s the listed units. State (current installed tag, previous
      binary) lives under `$XDG_STATE_HOME/workbuddy/updater` so a NAT-bound
      deployment can pull updates without exposing inbound CICD. A companion
      `workbuddy deploy rollback` swaps the previous binary back into place.
      `--dry-run` performs a check without download/replace/restart;
      checksum mismatches leave the existing binary untouched and surface as
      logged errors that the loop retries on the next interval.
    priority: P1
    version: v0.5.0
    status: tested
    acceptance_criteria:
      - "AC-095-1: `workbuddy deploy watch --repo owner/name` polls every --interval (default 5m) and compares the latest GitHub release tag against `<state-dir>/current-version`."
      - "AC-095-2: When a newer tag is found, the command downloads the linux-${ARCH} archive plus checksums.txt, verifies SHA256, atomically replaces the target binary, and writes the previous binary to `<state-dir>/previous-binary`."
      - "AC-095-3: After a successful upgrade the command runs `systemctl --<scope> restart` for each `--restart-units` entry; supervisor units are NOT restarted by default."
      - "AC-095-4: SHA256 mismatches do not touch the deployed binary; the error is reported and the next interval retries."
      - "AC-095-5: When the deployed version already matches latest the command logs a no-op and exits the iteration without download or restart."
      - "AC-095-6: `--dry-run` performs the latest-release check but never downloads, never replaces, and never restarts."
      - "AC-095-7: `workbuddy deploy rollback` swaps `<state-dir>/previous-binary` back into the target binary path and restarts the listed units."
      - "AC-095-8: `workbuddy deploy watch --help` documents every flag (--repo, --interval, --restart-units, --state-dir, --binary, --systemctl-scope, --dry-run, --once)."
    code:
      - cmd/deploy_watch.go
      - cmd/deploy.go
    tests:
      - cmd/deploy_watch_test.go
    deps: [REQ-062]
  - id: REQ-096
    title: Supervisor IPC client + task supervisor_agent_id wiring (foundational slice for #234)
    description: >
      Foundational slice toward making the worker stateless w.r.t. agent
      subprocesses (issue #234). Adds a typed Go client for the supervisor
      IPC API (`internal/supervisor/client`) covering POST /agents, GET
      /agents/:id, POST /agents/:id/cancel, and the SSE `/agents/:id/events`
      stream with from_offset resume semantics. Adds a nullable
      `supervisor_agent_id` column to the coordinator `task_queue` schema
      plus an `UpdateTaskSupervisorAgentID` setter so the worker can
      persist the agent id immediately after a successful POST. Hardens the
      supervisor events handler so an unknown agent id returns a real HTTP
      404 (the client maps this to a sentinel ErrAgentNotFound, which the
      future worker resume path uses to mark the task failed rather than
      retrying transport errors). The actual worker rewire (replacing
      `runtime.ProcessSession.Run`'s exec.Cmd path with the IPC client and
      streaming SSE lines through the existing claude_stream parser) and
      the codex app-server migration are deferred to follow-up slices so
      this lands cleanly without two parallel launch paths.
    priority: P1
    version: v0.6.0
    status: tested
    acceptance_criteria:
      - "AC-096-1: `internal/supervisor/client` package exposes StartAgent, Status, Cancel, and StreamEvents; the latter parses SSE `data:` lines into `{offset,line}` and supports `from_offset` resume."
      - "AC-096-2: client maps a 404 from /agents/:id, /agents/:id/cancel, and /agents/:id/events to a single sentinel ErrAgentNotFound so callers can distinguish 'agent gone' from transport errors."
      - "AC-096-3: supervisor `/agents/:id/events` returns HTTP 404 when the agent id is unknown rather than an empty 200 SSE stream."
      - "AC-096-4: coordinator schema migration adds `supervisor_agent_id TEXT NULL` to `task_queue`; existing rows read back as the empty string so older workers writing NULL stay valid."
      - "AC-096-5: `Store.UpdateTaskSupervisorAgentID(taskID, agentID)` writes the new column and round-trips through GetTask / QueryTasks."
      - "AC-096-6: client tests cover (a) start + full SSE stream with monotonic offsets, (b) resume from a non-zero from_offset producing only later lines (no duplicates), (c) 404 mapping for Status/Cancel/StreamEvents, (d) Cancel ending a long-sleeping subprocess."
    code:
      - internal/supervisor/client/client.go
      - internal/supervisor/supervisor.go
      - internal/store/store.go
      - internal/store/types.go
      - internal/runtime/process.go
      - internal/runtime/claude_stream.go
      - internal/runtime/claude.go
      - internal/runtime/registry.go
      - internal/launcher/launcher.go
      - internal/launcher/supervisor_inproc.go
      - cmd/worker.go
      - cmd/run.go
    tests:
      - internal/supervisor/client/client_test.go
      - internal/store/store_supervisor_agent_id_test.go
      - internal/launcher/launcher_test.go
      - internal/launcher/process_test.go
      - internal/launcher/claude_stream_test.go
      - internal/launcher/permissions_test.go
      - internal/launcher/test_helper_test.go
      - internal/launcher/supervisor_ipc_test.go
    deps:
      - REQ-092

  - id: REQ-097
    title: workbuddy-updater.service systemd unit + deploy CICD docs (#238)
    description: >
      Phase 2 step 3 of #224. Wraps the Phase 2.2 `workbuddy deploy
      watch` command into a systemd user service so a NAT-bound
      deployment automatically pulls new releases without operator
      intervention. `workbuddy deploy install` gains an opt-in
      `--enable-updater` flag (off by default to avoid surprising
      first-time installs); when set, install writes a separate
      `workbuddy-updater.service` unit alongside the main install,
      runs `daemon-reload`, then `enable --now`s the updater. The
      generated unit uses `Type=simple`, `Restart=always`,
      `RestartSec=30s`, reuses the install's `--env-file` (so a
      single env file can carry the GitHub PAT used for release
      reads), and `WantedBy=default.target` (or the system scope's
      multi-user.target). Operator docs land in
      `docs/deploy-cicd.md` covering token scope/placement, pause,
      manual upgrade, and rollback. The PR template gains a
      compatibility checkbox covering systemd unit / deploy command
      changes.
    priority: P1
    version: v0.5.0
    status: tested
    acceptance_criteria:
      - "AC-097-1: `workbuddy deploy install --enable-updater` writes <unit-dir>/workbuddy-updater.service with Type=simple, Restart=always, RestartSec=30s, WantedBy matching the install scope, and an ExecStart that invokes `<binary> deploy watch --repo <updater-repo> --interval <updater-interval> --systemctl-scope <scope> --restart-units <units,...>`."
      - "AC-097-2: `--enable-updater` is off by default; a plain `workbuddy deploy install` does not write or enable the updater unit."
      - "AC-097-3: When the updater is enabled, install runs systemctl daemon-reload then enable + start for `workbuddy-updater.service` in the install scope; --updater-interval is parsed as a Go duration and rejected if invalid."
      - "AC-097-4: The updater unit reuses every `--env-file` passed to install, so the GitHub PAT can live in the same env file as the worker runtime credentials."
      - "AC-097-5: docs/deploy-cicd.md documents token scope (Releases: read), placement (the env-file pointed at by --env-file), pausing (`systemctl --user stop workbuddy-updater`), manual upgrade (`workbuddy deploy upgrade` or `workbuddy deploy watch --once`), and rollback (`workbuddy deploy rollback` plus disable to keep it stopped)."
      - "AC-097-6: `.github/pull_request_template.md` contains the checkbox `- [ ] 涉及 systemd unit / deploy 命令的改动已更新对应文档`."
    code:
      - cmd/deploy.go
      - docs/deploy-cicd.md
      - .github/pull_request_template.md
    tests:
      - cmd/deploy_test.go
    deps: [REQ-095]

  - id: REQ-098
    title: Stateless worker boot resumes supervisor agents (issue #245, #234 slice 2)
    description: >
      Second slice of the #234 stateless-worker rewire. After a worker boot
      the process must reattach to every supervisor-managed agent it still
      owns instead of orphaning the in-flight subprocesses. The Coordinator
      Store gains `InFlightTasksForWorker(workerID)` that returns the
      running tasks belonging to the booting worker together with the
      latest session row's `events-v1.jsonl` path. The worker package gains
      a `ResumeInFlightTasks` orchestrator that fans out one goroutine per
      task, calls the supervisor IPC `Status` endpoint to probe liveness,
      then either re-subscribes to the SSE stream from the offset matching
      what is already on disk (so events-v1.jsonl continues without
      duplicates), or marks the task failed when the supervisor returns 404
      (the agent is gone; nothing to resume), or runs the finalize callback
      when the supervisor reports the agent already exited. Cross-host
      migration and supervisor-internal restart re-attach are explicitly
      out of scope (handled by #231/#240).
    priority: P1
    version: v0.6.0
    status: tested
    acceptance_criteria:
      - "AC-098-1: `Store.InFlightTasksForWorker(workerID)` returns `{TaskID, SessionID, SupervisorAgentID, EventsV1Path}` rows for status=running tasks claimed by workerID; rows lacking supervisor_agent_id are skipped because there is no agent for the resumer to attach to."
      - "AC-098-2: `worker.ResumeInFlightTasks` runs one goroutine per task (concurrent, does not block the boot loop) and probes each agent via `supclient.Status`."
      - "AC-098-3: 200 + status=running causes a `StreamEvents` resume with `from_offset` equal to the line count already in events-v1.jsonl, and appended lines are strictly monotonic in offset (no duplicates of pre-existing lines)."
      - "AC-098-4: 200 + status=exited triggers the finalize callback (`OnExited`)."
      - "AC-098-5: `ErrAgentNotFound` (404) marks the task failed via `OnFailed` with a reason that names the missing agent id; transport errors are not retried in-line and do NOT mark failed."
      - "AC-098-6: Three E2E tests in `internal/worker/resume_test.go` cover (a) full SSE stream + finalize, (b) simulated worker restart resuming from `from_offset=N` with strictly monotonic appended offsets, (c) supervisor 404 marking the task failed."
      - "AC-098-7: `Store.InFlightTasksForWorker` is covered by a store test that asserts worker_id filtering, status=running filtering, omission of rows missing supervisor_agent_id, and EventsV1Path derivation."
    code:
      - internal/store/queries.go
      - internal/worker/resume.go
    tests:
      - internal/store/store_inflight_for_worker_test.go
      - internal/worker/resume_test.go
    deps:
      - REQ-096
