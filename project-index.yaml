      - "AC-060-3: claim contention emits the existing dispatch_skipped_claim event, logs a WARN once per repo#issue per poll cycle, and audit/status treat a last dispatch_skipped_claim event as stuck immediately"
      - "AC-060-4: `workbuddy admin restart-issue --repo OWNER/NAME --issue N` exists and deletes issue_cache, clears issue_dependency_state, removes any surviving issue_claim row, and records an issue_restarted event"
