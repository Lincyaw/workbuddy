  - id: REQ-099
    title: session detail Pretty/Raw view + structured stream-json renderer (#258)
    description: >
      The session detail page (`/sessions/:id`) historically rendered each
      `kind=log` event by dumping `payload.line` as a raw string. Those lines
      are stream-json messages emitted by the Claude Code CLI or the Codex
      app-server and contain structured types (`system`, `user`, `assistant`,
      `tool_use`, `tool_result`, `result`, plus codex `method` envelopes).
      A small frontend parser (`web/src/lib/streamMessages.ts`) normalises
      both runtimes onto a discriminated union and a renderer
      (`web/src/components/StreamMessage.tsx`) draws each message kind:
      system events collapse to a chip, assistant content blocks are split
      into Markdown/text + tool_use cards, tool_result bodies preview the
      first ~10 lines with an Expand toggle, `result` lines render as a
      summary card, and unparsed lines fall back to the raw string with an
      `unparsed` badge. The page gains a Pretty/Raw toolbar toggle so
      operators can still copy raw JSON for diffing, and consecutive events
      that share a `turn_id` are grouped under a left-rail turn boundary.
      The codex runtime hint comes from `meta.runtime` so codex JSON-RPC
      lines route through their own renderer.
