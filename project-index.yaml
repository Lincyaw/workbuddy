      comment payloads, auth behavior, session viewing, and task-result
      handling stay identical to `workbuddy coordinator` +
      `workbuddy worker`.
    priority: P0
    version: v0.1.0
    status: tested
    acceptance_criteria:
      - "AC-017-1: cobra 命令 `workbuddy serve`，支持 --listen, --auth, --loopback-only, --poll-interval, --roles 标志（保留 --port 兼容默认 loopback 端口）"
      - "AC-017-2: 启动时加载配置 + 初始化 SQLite，失败则打印错误并 exit 1"
      - "AC-017-3: 启动 Poller goroutine"
      - "AC-017-4: 启动 Coordinator HTTP surface（含 /api/v1/tasks/*、audit、metrics、/sessions）"
