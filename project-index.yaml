      - "AC-031-4: 每个 poll cycle 基于当前 open issue graph 计算 `ready` / `blocked` / `override` / `needs_human` verdict，并检测 cycle"
      - "AC-031-5: `statemachine.dispatchAgent` 与 router pre-dispatch 都会在 verdict=`blocked`/`needs_human` 时拒绝派发；`override` 允许继续；statemachine 写 `dispatch_blocked_by_dependency` 事件"
      - "AC-031-6: 在 verdict 翻转时由 Coordinator 通过 `gh api .../reactions` 加/去 `confused` 反应，状态记入 `last_reaction_blocked` 防止重复写入"
      - "AC-031-7: 依赖 verdict、cycle、override、dispatch-blocked 行为写入 event log 审计事件"
      - "AC-031-8: 单元测试覆盖 parser、cycle detection、verdict 分类、dispatch gate、reaction reconciler；集成测试证明 dependent issue 在 upstream done 前不会派发"
